<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShoeString2</title>
    <meta name="description" content="A comprehensive re-design of the original ShoeString framework">
    
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    
    <!-- Highlight.js - using pre-built bundle that works in browser -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #ffffff;
            --bg-secondary: #f8fafc;
            --text: #0f172a;
            --text-secondary: #475569;
            --border: #e2e8f0;
            --code-bg: #1e293b;
            --sidebar-width: 300px;
        }
        
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --bg-secondary: #1e293b;
                --text: #f1f5f9;
                --text-secondary: #94a3b8;
                --border: #334155;
                --code-bg: #020617;
            }
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 16px;
            line-height: 1.7;
            color: var(--text);
            background: var(--bg);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            min-height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 2rem 0;
            z-index: 100;
        }
        
        .sidebar-brand {
            padding: 0 1.5rem 1.5rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        
        .sidebar-brand h1 {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.3;
        }
        
        .sidebar-brand small {
            display: block;
            margin-top: 0.375rem;
            font-size: 0.8125rem;
            color: var(--text-secondary);
            font-weight: 400;
        }
        
        .sidebar-nav {
            padding: 0 1rem;
        }
        
        .sidebar-nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .sidebar-nav > ul > li {
            margin-bottom: 0.25rem;
        }
        
        .sidebar-nav > ul > li > a {
            display: block;
            padding: 0.625rem 1rem;
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9375rem;
            border-radius: 8px;
            transition: all 0.15s ease;
        }
        
        .sidebar-nav > ul > li > a:hover {
            background: var(--primary);
            color: white;
        }
        
        .sidebar-nav ul ul {
            padding: 0.25rem 0 0.5rem 1rem;
        }
        
        .sidebar-nav ul ul li a {
            display: block;
            padding: 0.375rem 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            border-radius: 6px;
            transition: all 0.15s ease;
        }
        
        .sidebar-nav ul ul li a:hover {
            color: var(--primary);
            background: rgba(37, 99, 235, 0.08);
        }
        
        /* Content Area */
        .content-wrapper {
            margin-left: var(--sidebar-width);
            flex: 1;
            min-width: 0;
        }
        
        .content {
            max-width: 800px;
            margin: 0 auto;
            padding: 3rem 2rem 6rem;
        }
        
        /* Typography */
        .content h1 {
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--text);
            margin: 3rem 0 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--primary);
            letter-spacing: -0.03em;
        }
        
        .content h1:first-child {
            margin-top: 0;
        }
        
        .content h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text);
            margin: 2.5rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
            letter-spacing: -0.02em;
        }
        
        .content h3 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text);
            margin: 2rem 0 0.75rem;
        }
        
        .content h4 {
            font-size: 1.0625rem;
            font-weight: 600;
            color: var(--text);
            margin: 1.5rem 0 0.5rem;
        }
        
        .content p {
            margin: 1rem 0;
            color: var(--text);
        }
        
        .content a {
            color: var(--primary);
            text-decoration: none;
        }
        
        .content a:hover {
            text-decoration: underline;
        }
        
        .content strong {
            font-weight: 600;
        }
        
        /* Lists */
        .content ul, .content ol {
            margin: 1rem 0;
            padding-left: 1.5rem;
        }
        
        .content li {
            margin: 0.375rem 0;
        }
        
        .content li > ul, .content li > ol {
            margin: 0.25rem 0;
        }
        
        /* Code */
        .content code {
            font-family: 'JetBrains Mono', 'SF Mono', Monaco, monospace;
            font-size: 0.875em;
        }
        
        .content p code, .content li code, .content td code {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 0.125em 0.375em;
            border-radius: 4px;
            font-weight: 500;
        }
        
        .content pre {
            background: #4b638b; 
            border-radius: 8px;
            padding: 1.25rem 1.5rem;
            overflow-x: auto;
            margin: 1.25rem 0;
            border: 1px solid var(--border);
        }
        
        .content pre code {
            background: none;
            border: none;
            padding: 0;
            color: white;
            font-size: 0.875rem;
            line-height: 1.6;
        }
        
        /* Tables */
        .content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            font-size: 0.9375rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .content th {
            background: var(--bg-secondary);
            font-weight: 600;
            text-align: left;
            padding: 0.875rem 1rem;
            border-bottom: 1px solid var(--border);
        }
        
        .content td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
        }
        
        .content tr:last-child td {
            border-bottom: none;
        }
        
        .content tr:nth-child(even) {
            background: var(--bg-secondary);
        }
        
        /* Blockquotes */
        .content blockquote {
            margin: 1.5rem 0;
            padding: 1rem 1.25rem;
            background: rgba(37, 99, 235, 0.06);
            border-left: 4px solid var(--primary);
            border-radius: 0 8px 8px 0;
        }
        
        .content blockquote p {
            margin: 0;
        }
        
        .content blockquote p + p {
            margin-top: 0.75rem;
        }
        
        /* Images */
        .content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 1.5rem 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
        }
        
        /* Horizontal Rules */
        .content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 3rem 0;
        }
        
        /* Mobile Responsive */
        @media (max-width: 900px) {
            :root {
                --sidebar-width: 260px;
            }
        }
        
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -100%;
                width: 280px;
                transition: left 0.3s ease;
                box-shadow: 4px 0 20px rgba(0, 0, 0, 0.15);
            }
            
            .sidebar.active {
                left: 0;
            }
            
            .content-wrapper {
                margin-left: 0;
            }
            
            .content {
                padding: 1.5rem 1rem 4rem;
            }
            
            .content h1 {
                font-size: 1.75rem;
            }
            
            .content h2 {
                font-size: 1.35rem;
            }
            
            .mobile-menu-toggle {
                display: flex !important;
            }
            
            .menu-overlay.active {
                display: block;
            }
        }
        
        /* Mobile Menu Toggle */
        .mobile-menu-toggle {
            display: none;
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            width: 56px;
            height: 56px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            z-index: 200;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.4);
            font-size: 1.5rem;
        }
        
        .mobile-menu-toggle:hover {
            background: var(--primary-dark);
        }
        
        .menu-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99;
        }
        
        /* Back to Top */
        .back-to-top {
            position: fixed;
            bottom: 1.5rem;
            right: 5rem;
            width: 44px;
            height: 44px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 50%;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            transition: all 0.15s ease;
        }
        
        .back-to-top:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .back-to-top.visible {
            display: flex;
        }
        
        @media (max-width: 768px) {
            .back-to-top {
                bottom: 6rem;
                right: 1.5rem;
            }
        }
        
        /* Loading State */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 50vh;
            color: var(--text-secondary);
        }
        
        /* Print Styles */
        @media print {
            .sidebar, .mobile-menu-toggle, .back-to-top, .menu-overlay {
                display: none !important;
            }
            
            .content-wrapper {
                margin-left: 0;
            }
            
            .content {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Mobile Menu Overlay -->
    <div class="menu-overlay" onclick="toggleMenu()"></div>
    
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <h1>ShoeString - V2</h1>
            <small>Compile on Windows - Run Anywhere</small>
        </div>
        <nav class="sidebar-nav">
            <ul id="nav-menu"></ul>
        </nav>
    </div>
    
    <!-- Content -->
    <div class="content-wrapper">
        <div class="content" id="content">
            <div class="loading">Loading documentation...</div>
        </div>
    </div>
    
    <!-- Mobile Menu Toggle -->
    <button class="mobile-menu-toggle" onclick="toggleMenu()" aria-label="Toggle menu">
        ☰
    </button>
    
    <!-- Back to Top -->
    <button class="back-to-top" onclick="scrollToTop()" aria-label="Back to top">
        ↑
    </button>
    
    <script>
        // Mobile menu toggle
        function toggleMenu() {
            document.querySelector('.sidebar').classList.toggle('active');
            document.querySelector('.menu-overlay').classList.toggle('active');
        }
        
        // Close menu when clicking a link (mobile)
        document.addEventListener('click', function(e) {
            if (e.target.closest('.sidebar-nav a')) {
                document.querySelector('.sidebar').classList.remove('active');
                document.querySelector('.menu-overlay').classList.remove('active');
            }
        });
        
        // Back to top button
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        window.addEventListener('scroll', function() {
            var btn = document.querySelector('.back-to-top');
            if (window.scrollY > 500) {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }
        });
        
        // Generate slug from text
        function slugify(text) {
            return text
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/(^-|-$)/g, '');
        }
        
        // Build navigation from headings
        function buildNav(container) {
            var nav = document.getElementById('nav-menu');
            var headings = container.querySelectorAll('h1, h2');
            var currentH1Item = null;
            var currentSublist = null;
            
            headings.forEach(function(heading) {
                // Add ID to heading for anchor links
                if (!heading.id) {
                    heading.id = slugify(heading.textContent);
                }
                
                var li = document.createElement('li');
                var a = document.createElement('a');
                a.href = '#' + heading.id;
                a.textContent = heading.textContent;
                li.appendChild(a);
                
                if (heading.tagName === 'H1') {
                    nav.appendChild(li);
                    currentH1Item = li;
                    currentSublist = null;
                } else if (heading.tagName === 'H2' && currentH1Item) {
                    if (!currentSublist) {
                        currentSublist = document.createElement('ul');
                        currentH1Item.appendChild(currentSublist);
                    }
                    currentSublist.appendChild(li);
                }
            });
        }
        
        // Load and render markdown
        function loadContent() {
            fetch('content-v4.md')
                .then(function(response) {
                    if (!response.ok) throw new Error('Failed to load content');
                    return response.text();
                })
                .then(function(markdown) {
                    // Configure marked
                    marked.setOptions({
                        highlight: function(code, lang) {
                            if (lang && hljs.getLanguage(lang)) {
                                return hljs.highlight(code, { language: lang }).value;
                            }
                            return hljs.highlightAuto(code).value;
                        },
                        breaks: false,
                        gfm: true
                    });
                    
                    // Render markdown
                    var content = document.getElementById('content');
                    content.innerHTML = marked.parse(markdown);
                    
                    // Build navigation
                    buildNav(content);
                    
                    // Handle hash navigation on load
                    if (window.location.hash) {
                        var target = document.querySelector(window.location.hash);
                        if (target) {
                            setTimeout(function() {
                                target.scrollIntoView();
                            }, 100);
                        }
                    }
                })
                .catch(function(error) {
                    document.getElementById('content').innerHTML = 
                        '<div class="loading">Error loading documentation: ' + error.message + '</div>';
                });
        }
        
        // Initialize
        loadContent();
    </script>
</body>
</html>
